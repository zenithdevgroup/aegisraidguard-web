<section class="hero">

<!-- STATS -->
<section class="stats">
  <div class="stat">
    <h3 id="servers">0</h3>

  </div>

  <div class="stat">
    <h3 id="users">0</h3>
    <p>Users Secured</p>
  </div>

  <div class="stat">
    <h3 class="status online"></h3>
    <p>Bot Status</p>
  </div>
</section>

<!-- DASHBOARD STYLE -->
<section class="dashboard">
  <h2>Live Protection System</h2>

  <div class="dash-box">
    <p>Threat Detection</p>
    <div class="bar"><div class="fill"></div></div>
  </div>

  <div class="dash-box">
    <p>Security Level</p>
    <div class="bar"><div class="fill strong"></div></div>
  </div>
</section>
